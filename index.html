<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 VALET HERO | 7/24</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; width: 320px; border: 1px solid #334155; }
        h1 { color: #38bdf8; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: none; background: #334155; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #7dd3fc; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 VALET HERO</h1>
        <p>Hızlı Ödeme Paneli</p>
        <input type="text" id="name" placeholder="Adınız Soyadınız">
        <button onclick="odemeYap()">💳 50 TL ÖDE</button>
        <p id="status" style="margin-top:15px; font-size:14px; color:#94a3b8;"></p>
    </div>

    <script>
        // SENİN FİREBASE BİLGİLERİN
        const firebaseConfig = {
            apiKey: "AIzaSyDavWy44RpaNKz-OYJaVyF25H8KXDxQhcc",
            authDomain: "ari-uydu-projesi-f9413.firebaseapp.com",
            databaseURL: "https://ari-uydu-projesi-f9413-default-rtdb.firebaseio.com",
            projectId: "ari-uydu-projesi-f9413"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function odemeYap() {
            const userName = document.getElementById('name').value;
            const status = document.getElementById('status');

            if(userName) {
                status.innerText = "Sinyal gönderiliyor...";
                db.ref("cihaz").set({
                    komut: "YAK",
                    user: userName,
                    zaman: new Date().toLocaleTimeString()
                }).then(() => {
                    status.style.color = "#4ade80";
                    status.innerText = "✅ Başarılı! OLED Ekran Yanıyor!";
                    document.getElementById('name').value = "";
                }).catch((e) => {
                    status.style.color = "#f87171";
                    status.innerText = "Hata: " + e.message;
                });
            } else {
                alert("Lütfen isim giriniz!");
            }
        }
    </script>
</body>
</html>
